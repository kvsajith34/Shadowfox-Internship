version: "3.8"

services:
  # ─── Backend API ──────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: visualrag-backend
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=docker
      - MOCK_MODE=${MOCK_MODE:-true}
      - DEFAULT_PROVIDER=${DEFAULT_PROVIDER:-mock}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - HF_TOKEN=${HF_TOKEN:-}
      - CLAUDE_API_KEY=${CLAUDE_API_KEY:-}
      - DATABASE_URL=postgresql://visualrag:visualrag_password@db:5432/visualrag_db
      - STORAGE_BACKEND=${STORAGE_BACKEND:-local}
      - S3_ENDPOINT_URL=http://minio:9000
      - S3_ACCESS_KEY=visualrag
      - S3_SECRET_KEY=visualrag_password
      - S3_BUCKET=visualrag-uploads
      - CORS_ORIGINS=["http://localhost:3000","http://localhost:5173","http://127.0.0.1:3000","http://127.0.0.1:5173"]
    volumes:
      - backend-uploads:/app/uploads
      - backend-chroma:/app/chroma_db
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── PostgreSQL Database ──────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: visualrag-db
    environment:
      POSTGRES_USER: visualrag
      POSTGRES_PASSWORD: visualrag_password
      POSTGRES_DB: visualrag_db
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U visualrag -d visualrag_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── MinIO (S3-compatible storage) ───────────────────────
  minio:
    image: minio/minio:latest
    container_name: visualrag-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: visualrag
      MINIO_ROOT_PASSWORD: visualrag_password
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped
    profiles:
      - full

  # ─── ChromaDB (Vector store) ─────────────────────────────
  chromadb:
    image: chromadb/chroma:latest
    container_name: visualrag-chromadb
    ports:
      - "8001:8000"
    volumes:
      - chroma-data:/chroma/chroma
    environment:
      - ANONYMIZED_TELEMETRY=FALSE
    restart: unless-stopped
    profiles:
      - full

  # ─── Redis (Optional caching) ────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: visualrag-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    profiles:
      - full

volumes:
  postgres-data:
  backend-uploads:
  backend-chroma:
  minio-data:
  chroma-data:
  redis-data:
